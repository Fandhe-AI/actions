name: Submodule Update
description: git submodule を最新に追従させ、変更があれば PR を自動作成する

inputs:
  token:
    description: 'push と PR 作成に使うトークン (contents: write, pull-requests: write)'
    required: true
  base-branch:
    description: 'PR の向き先ブランチ'
    required: false
    default: 'main'
  branch-prefix:
    description: '自動生成するブランチ名の prefix。最終ブランチ名は {prefix}-{YYYYMMDD}'
    required: false
    default: 'chore/submodule-update'
  submodule-path:
    description: '更新対象の submodule パス。空の場合は全 submodule'
    required: false
    default: ''
  submodule-branch:
    description: 'submodule で追従するブランチ名。指定時は対象 submodule の .gitmodules 設定を一時的に上書き'
    required: false
    default: ''
  commit-message:
    description: 'コミットメッセージ (Conventional Commits)'
    required: false
    default: 'chore: submodule を最新に更新'
  pr-title:
    description: 'PR タイトル'
    required: false
    default: 'chore: submodule を最新に更新'
  pr-body:
    description: 'PR 本文。空の場合は変更サマリを自動生成'
    required: false
    default: ''
  pr-labels:
    description: 'PR に付与するラベル (カンマ区切り)'
    required: false
    default: ''
  git-user-name:
    description: 'コミット作成者名'
    required: false
    default: 'github-actions[bot]'
  git-user-email:
    description: 'コミット作成者メール'
    required: false
    default: '41898282+github-actions[bot]@users.noreply.github.com'
  auto-merge:
    description: >-
      PR 作成後に条件を満たせば auto-merge する。
      空/null/true/yes/on/1/enabled → 有効、false/no/off/0/disabled → 無効、
      解釈不能値は安全側で無効。consumer は ${{ vars.SUBMODULE_AUTO_MERGE }} を
      渡す想定で、未設定(空文字)＝有効。ただし既存互換のため input 既定値のみ
      'false'(無効) とする。この「空=有効 / 既定=無効」の非対称は意図的。
    required: false
    default: 'false'
  auto-merge-allowlist:
    description: >-
      自動マージを許可する submodule path の allowlist。
      空なら全 submodule 許可 (allow-all)。改行/カンマ区切りで複数指定でき、
      各エントリは biome scanner 準拠の glob (順次評価・last-match-wins)。
    required: false
    default: ''
  auto-merge-strategy:
    description: 'マージ戦略 (squash / rebase / merge)'
    required: false
    default: 'squash'
  auto-merge-immediate-fallback:
    description: >-
      gh pr merge --auto が allow_auto_merge:false で失敗した時に
      即時マージへフォールバックするか (true/false)。
    required: false
    default: 'true'

outputs:
  has-changes:
    description: 'submodule に更新があったかどうか (true/false)'
    value: ${{ steps.detect.outputs.has_changes }}
  branch-name:
    description: '自動生成したブランチ名'
    value: ${{ steps.branch.outputs.branch_name }}
  pr-url:
    description: '作成または更新した PR の URL'
    value: ${{ steps.pr.outputs.pr_url }}
  merged:
    description: 'auto-merge を実行した (有効化 or 即時マージ) かどうか (true/false)'
    value: ${{ steps.automerge.outputs.merged }}
  auto-merge-skipped-reason:
    description: >-
      auto-merge をスキップした理由 (スキップ時のみ設定)。
      disabled / unparseable-switch / unknown-paths / not-allowlisted のいずれか。
    value: ${{ steps.automerge.outputs.skipped_reason }}

runs:
  using: composite
  steps:
    - name: Initialize submodules
      shell: bash
      run: |
        git submodule sync --recursive
        git submodule update --init --recursive

    - name: Capture pre-update state
      id: pre
      shell: bash
      run: |
        BEFORE=$(git submodule status --recursive || true)
        {
          echo 'status<<SUBMODULE_EOF'
          echo "$BEFORE"
          echo 'SUBMODULE_EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Override submodule branch
      if: inputs.submodule-branch != ''
      shell: bash
      env:
        SUBMODULE_PATH: ${{ inputs.submodule-path }}
        SUBMODULE_BRANCH: ${{ inputs.submodule-branch }}
      run: |
        set -euo pipefail

        if [ -n "$SUBMODULE_PATH" ]; then
          NAME=$(git config --file .gitmodules --get-regexp '^submodule\..*\.path$' \
            | awk -v p="$SUBMODULE_PATH" '$2 == p {print $1}' \
            | sed -E 's/^submodule\.(.*)\.path$/\1/')
          if [ -z "$NAME" ]; then
            echo "::error::.gitmodules に該当する submodule がありません: $SUBMODULE_PATH"
            exit 1
          fi
          NAMES="$NAME"
        else
          NAMES=$(git config --file .gitmodules --get-regexp '^submodule\..*\.path$' \
            | sed -E 's/^submodule\.(.*)\.path .*/\1/')
        fi

        while IFS= read -r name; do
          [ -z "$name" ] && continue
          git config --file .gitmodules "submodule.${name}.branch" "$SUBMODULE_BRANCH"
          echo "::notice::submodule '${name}' のブランチを '${SUBMODULE_BRANCH}' に設定"
        done <<< "$NAMES"

        git submodule sync --recursive

    - name: Update submodules
      shell: bash
      env:
        SUBMODULE_PATH: ${{ inputs.submodule-path }}
      run: |
        set -euo pipefail
        if [ -n "$SUBMODULE_PATH" ]; then
          git submodule update --remote --recursive -- "$SUBMODULE_PATH"
        else
          git submodule update --remote --recursive
        fi

    - name: Restore .gitmodules
      if: always() && inputs.submodule-branch != ''
      shell: bash
      run: |
        # submodule-branch の一時上書きはコミットしないため .gitmodules を元に戻す。
        # 前段ステップが失敗した場合でも確実に復元するため always() を付ける。
        git checkout -- .gitmodules 2>/dev/null || true

    - name: Detect changes
      id: detect
      shell: bash
      run: |
        if git diff --quiet; then
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
          echo "::notice::submodule に更新はありません"
        else
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Generate branch name
      id: branch
      if: steps.detect.outputs.has_changes == 'true'
      shell: bash
      env:
        BRANCH_PREFIX: ${{ inputs.branch-prefix }}
      run: |
        DATE=$(date -u +%Y%m%d)
        echo "branch_name=${BRANCH_PREFIX}-${DATE}" >> "$GITHUB_OUTPUT"

    - name: Build change summary
      id: summary
      if: steps.detect.outputs.has_changes == 'true'
      shell: bash
      env:
        BEFORE_STATUS: ${{ steps.pre.outputs.status }}
      run: |
        set -euo pipefail
        AFTER=$(git submodule status --recursive)

        SUMMARY=""
        # bump した submodule path を直接蓄積する。
        # これを auto-merge の allowlist 判定にそのまま渡すことで、PR 変更ファイル
        # からの逆算 (gh pr view --json files × .gitmodules) が不要になり正確。
        CHANGED_PATHS=""
        while IFS= read -r after_line; do
          [ -z "$after_line" ] && continue
          after_sha=$(echo "$after_line" | awk '{print $1}' | sed 's/^[-+U]//')
          path=$(echo "$after_line" | awk '{print $2}')
          before_line=$(echo "$BEFORE_STATUS" | awk -v p="$path" '$2 == p {print; exit}')
          before_sha=$(echo "$before_line" | awk '{print $1}' | sed 's/^[-+U]//')
          if [ -n "$before_line" ] && [ "$before_sha" != "$after_sha" ]; then
            before_short=$(echo "$before_sha" | cut -c1-7)
            after_short=$(echo "$after_sha" | cut -c1-7)
            SUMMARY="${SUMMARY}- \`${path}\`: ${before_short} → ${after_short}"$'\n'
            CHANGED_PATHS="${CHANGED_PATHS}${path}"$'\n'
          fi
        done <<< "$AFTER"

        if [ -z "$SUMMARY" ]; then
          SUMMARY="- (変更サマリを生成できませんでした)"$'\n'
        fi

        {
          echo 'summary<<SUBMODULE_EOF'
          echo "$SUMMARY"
          echo 'SUBMODULE_EOF'
          echo 'paths<<SUBMODULE_PATHS_EOF'
          printf '%s' "$CHANGED_PATHS"
          echo 'SUBMODULE_PATHS_EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Commit and push branch
      if: steps.detect.outputs.has_changes == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        BRANCH_NAME: ${{ steps.branch.outputs.branch_name }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
        GIT_USER_NAME: ${{ inputs.git-user-name }}
        GIT_USER_EMAIL: ${{ inputs.git-user-email }}
      run: |
        set -euo pipefail

        git config user.name "$GIT_USER_NAME"
        git config user.email "$GIT_USER_EMAIL"

        ORIGINAL_REMOTE_URL=$(git remote get-url origin)
        REMOTE_RESTORED=0
        restore_remote() {
          if [ "$REMOTE_RESTORED" = "0" ]; then
            git remote set-url origin "$ORIGINAL_REMOTE_URL" || true
            REMOTE_RESTORED=1
          fi
        }
        trap restore_remote EXIT

        case "$ORIGINAL_REMOTE_URL" in
          https://*)
            AUTH_URL="https://x-access-token:${GH_TOKEN}@${ORIGINAL_REMOTE_URL#https://}"
            git remote set-url origin "$AUTH_URL"
            ;;
        esac

        # 現在の HEAD (base-branch を checkout 済み) から新ブランチを作成し、
        # submodule 更新の作業ツリー変更を保持したままコミットする
        git checkout -B "$BRANCH_NAME"
        git add -A
        git commit -m "$COMMIT_MESSAGE"

        # actions/checkout は triggering ref しか fetch しないため、同日再実行時に
        # リモート側の既存ブランチに対する remote-tracking ref が存在しない。
        # --force-with-lease を機能させるため、push 前に明示的に fetch する
        # (初回実行ではリモートに存在しないので失敗しても無視)。
        git fetch origin "$BRANCH_NAME" 2>/dev/null || true
        git push --force-with-lease origin "$BRANCH_NAME"

    - name: Create or update PR
      id: pr
      if: steps.detect.outputs.has_changes == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        BRANCH_NAME: ${{ steps.branch.outputs.branch_name }}
        BASE_BRANCH: ${{ inputs.base-branch }}
        PR_TITLE: ${{ inputs.pr-title }}
        PR_BODY_INPUT: ${{ inputs.pr-body }}
        PR_LABELS: ${{ inputs.pr-labels }}
        CHANGE_SUMMARY: ${{ steps.summary.outputs.summary }}
      run: |
        set -euo pipefail

        if [ -n "$PR_BODY_INPUT" ]; then
          BODY="$PR_BODY_INPUT"
        else
          BODY=$(printf '## submodule 更新\n\n以下の submodule を最新に更新しました。\n\n%s\n\n---\n\nこの PR は `Fandhe-AI/actions/submodule-update` により自動生成されています。\n' "$CHANGE_SUMMARY")
        fi

        EXISTING=$(gh pr list \
          --head "$BRANCH_NAME" \
          --state open \
          --json number,url \
          --jq '.[0]')

        if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
          PR_NUMBER=$(echo "$EXISTING" | jq -r '.number')
          PR_URL=$(echo "$EXISTING" | jq -r '.url')
          gh pr edit "$PR_NUMBER" --title "$PR_TITLE" --body "$BODY"
          echo "::notice::既存 PR を更新しました: $PR_URL"
        else
          CREATE_ARGS=(--head "$BRANCH_NAME" --base "$BASE_BRANCH" --title "$PR_TITLE" --body "$BODY")
          if [ -n "$PR_LABELS" ]; then
            IFS=',' read -ra LABEL_ARR <<< "$PR_LABELS"
            for label in "${LABEL_ARR[@]}"; do
              label_trimmed=$(echo "$label" | sed 's/^ *//;s/ *$//')
              [ -n "$label_trimmed" ] && CREATE_ARGS+=(--label "$label_trimmed")
            done
          fi
          PR_URL=$(gh pr create "${CREATE_ARGS[@]}")
          echo "::notice::PR を作成しました: $PR_URL"
        fi

        echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

    - name: Auto-merge PR if allowed
      id: automerge
      if: steps.detect.outputs.has_changes == 'true' && steps.pr.outputs.pr_url != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        PR_URL: ${{ steps.pr.outputs.pr_url }}
        INPUT_AUTO_MERGE: ${{ inputs.auto-merge }}
        INPUT_ALLOWLIST: ${{ inputs.auto-merge-allowlist }}
        INPUT_STRATEGY: ${{ inputs.auto-merge-strategy }}
        INPUT_FALLBACK: ${{ inputs.auto-merge-immediate-fallback }}
        BUMPED_PATHS: ${{ steps.summary.outputs.paths }}
      run: |
        set -euo pipefail

        # 既定は未マージ。マージ成功時のみ後から true で上書きする
        # (GITHUB_OUTPUT は同一キーの後勝ち)。
        echo "merged=false" >> "$GITHUB_OUTPUT"

        # --- 1. 全体スイッチ判定 -------------------------------------------
        # 注意: 空文字/null は「有効」に倒す。consumer が
        # ${{ vars.SUBMODULE_AUTO_MERGE }} を渡し未設定=有効としたいため。
        # 一方 input 既定値だけは 'false' なので、consumer が auto-merge を一切
        # 渡さない場合は無効 = 既存互換挙動。この非対称は意図的。
        switch="$(printf '%s' "${INPUT_AUTO_MERGE:-}" \
          | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
        case "$switch" in
          '' | true | yes | on | 1 | enabled | enable)
            : # 自動マージ有効 (未設定含む)
            ;;
          false | no | off | 0 | disabled | disable)
            echo "::notice::auto-merge=${INPUT_AUTO_MERGE} のため自動マージをスキップ"
            echo "skipped_reason=disabled" >> "$GITHUB_OUTPUT"
            exit 0
            ;;
          *)
            # 解釈不能値はそのまま ::warning:: に埋め込まない (::command:: 注入防止)
            echo "::warning::auto-merge の値を解釈できないため自動マージを無効化します"
            echo "auto-merge=${INPUT_AUTO_MERGE}"
            echo "skipped_reason=unparseable-switch" >> "$GITHUB_OUTPUT"
            exit 0
            ;;
        esac

        # --- 2. allowlist をパース (改行 / カンマ区切り → 配列) -------------
        patterns=()
        while IFS= read -r line; do
          line="$(printf '%s' "$line" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          [ -n "$line" ] && patterns+=("$line")
        done < <(printf '%s' "${INPUT_ALLOWLIST:-}" | tr ',' '\n')

        if [ "${#patterns[@]}" -eq 0 ]; then
          allow_all=1
          echo "::notice::allowlist 未指定 → 全 submodule を自動マージ対象とします"
        else
          allow_all=0
          # ${patterns[*]} を直接 echo せず printf で改行出力 (::command:: 注入防止)
          printf '::notice::allowlist %d 件\n' "${#patterns[@]}"
          printf '%s\n' "${patterns[@]}"
        fi

        # --- 3. 今回 bump した submodule path 集合 (action が直接保持) -------
        # PR 変更ファイルからの逆算は不要。summary ステップが算出した path を使う。
        changed_submodules=()
        while IFS= read -r p; do
          [ -n "$p" ] && changed_submodules+=("$p")
        done <<< "${BUMPED_PATHS:-}"

        # --- 4. glob マッチング (biome scanner 準拠) -----------------------
        # glob を ERE に変換。* はセパレータ非跨ぎ、** は跨ぎ。
        glob_to_regex() {
          local glob="$1" out="" i=0 n=${#1} c nxt
          while [ "$i" -lt "$n" ]; do
            c="${glob:i:1}"
            case "$c" in
              '*')
                nxt="${glob:i+1:1}"
                if [ "$nxt" = '*' ]; then
                  out+='.*'
                  i=$((i + 2))
                else
                  out+='[^/]*'
                  i=$((i + 1))
                fi
                ;;
              '?')
                out+='[^/]'
                i=$((i + 1))
                ;;
              '.' | '+' | '(' | ')' | '|' | '^' | '$' | '{' | '}' | '[' | ']' | '-' | \\)
                out+="\\$c"
                i=$((i + 1))
                ;;
              *)
                out+="$c"
                i=$((i + 1))
                ;;
            esac
          done
          printf '%s' "$out"
        }

        # path が allowlist で許可されるか (順次評価・last-match-wins)。
        # 全パターンを順に見て、最後にマッチしたものが positive なら許可、
        # negation (先頭 '!') なら不許可。どれにもマッチしなければ不許可。
        is_allowed() {
          local path="$1" decision=1 p neg glob re
          for p in "${patterns[@]}"; do
            if [ "${p:0:1}" = '!' ]; then
              neg=1
              glob="${p:1}"
            else
              neg=0
              glob="$p"
            fi
            re="$(glob_to_regex "$glob")"
            if [[ "$path" =~ ^${re}$ ]]; then
              if [ "$neg" -eq 1 ]; then
                decision=1
              else
                decision=0
              fi
            fi
          done
          return "$decision"
        }

        # --- 5. 判定 ------------------------------------------------------
        if [ "$allow_all" -eq 1 ]; then
          proceed=1
        elif [ "${#changed_submodules[@]}" -eq 0 ]; then
          # allowlist 指定済みなのに bump path を特定できない → 安全側で手動
          echo "::warning::bump した submodule を特定できません。allowlist 指定時は安全のため自動マージをスキップします。"
          echo "skipped_reason=unknown-paths" >> "$GITHUB_OUTPUT"
          exit 0
        else
          proceed=1
          for sm in "${changed_submodules[@]}"; do
            # path も別行に出力 (他箇所同様 ::command:: 注入を避ける)
            if is_allowed "$sm"; then
              echo "::notice::submodule は自動マージ許可"
              printf '%s\n' "$sm"
            else
              echo "::notice::submodule は allowlist 対象外 → 手動レビュー"
              printf '%s\n' "$sm"
              proceed=0
            fi
          done
        fi

        if [ "$proceed" -ne 1 ]; then
          echo "::notice::自動マージ条件を満たさないため手動レビュー対象として残します: ${PR_URL}"
          echo "skipped_reason=not-allowlisted" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # --- 6. strategy / fallback の解釈 --------------------------------
        strategy="$(printf '%s' "${INPUT_STRATEGY:-squash}" \
          | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
        case "$strategy" in
          squash | rebase | merge) : ;;
          *)
            echo "::warning::auto-merge-strategy を解釈できないため squash を使用します"
            echo "auto-merge-strategy=${INPUT_STRATEGY}"
            strategy='squash'
            ;;
        esac

        fb="$(printf '%s' "${INPUT_FALLBACK:-true}" \
          | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
        case "$fb" in
          '' | true | yes | on | 1 | enabled | enable) fallback=1 ;;
          *) fallback=0 ;;
        esac

        # --- 7. マージ実行 (auto-merge → 即時マージ フォールバック) --------
        # $PR_URL は -- でフラグと区別。gh 出力 ($out) は別 echo 行に分離。
        if out="$(gh pr merge -- "$PR_URL" --auto --"$strategy" 2>&1)"; then
          echo "::notice::auto-merge を有効化しました: ${PR_URL}"
          echo "merged=true" >> "$GITHUB_OUTPUT"
        elif [ "$fallback" -eq 1 ]; then
          echo "::warning::auto-merge を有効化できません。即時 ${strategy} merge を試みます。"
          echo "$out"
          if out="$(gh pr merge -- "$PR_URL" --"$strategy" 2>&1)"; then
            echo "::notice::即時 ${strategy} merge しました: ${PR_URL}"
            echo "merged=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::自動マージに失敗しました。"
            echo "$out"
            exit 1
          fi
        else
          echo "::error::auto-merge を有効化できず、フォールバックも無効のため失敗します。"
          echo "$out"
          exit 1
        fi
